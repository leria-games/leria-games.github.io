name: Deploy Portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject private projects data
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}git@github.com:leria-games/website-data.git temp-data
          mkdir -p ./data
          cp temp-data/data/projects.js ./data/projects.js
          rm -rf temp-data

      - name: Minify projects.js
        run: |
          npm install -g terser
          terser ./data/projects.js -o ./data/projects.js --compress

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
